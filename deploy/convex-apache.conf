# =============================================================================
# Apache VirtualHost — Convex backend reverse proxy (with WebSocket upgrade)
#   Install to: /etc/httpd/conf.d/convex-todo.conf  (Amazon Linux / httpd)
#               /etc/apache2/sites-available/convex-todo.conf  (Ubuntu, then a2ensite)
#
# Proxies https://convex.yourdomain.com  ->  the self-hosted convex-backend,
# published on the host at 127.0.0.1:3310 (docker host 3310 -> container 3210).
# Host port is 3310, NOT Convex's default 3210, to avoid colliding with the
# existing sno-newsroom app already bound to :3210 on this box.
#
# Requirements (Apache 2.4):
#   mod_proxy, mod_proxy_http, mod_proxy_wstunnel, mod_rewrite, mod_headers
#   Verify:  httpd -M | grep -E "proxy|proxy_http|proxy_wstunnel|rewrite|headers"
#
# This is the HTTP-only form. Run `certbot --apache -d convex.yourdomain.com`
# afterwards; Certbot creates the :443 VirtualHost and the HTTP->HTTPS redirect.
#
# IMPORTANT: replace convex.yourdomain.com with your real domain before reload.
#            Always run `httpd -t` (or `apache2ctl configtest`) before reloading.
# =============================================================================

<VirtualHost *:80>
    ServerName convex.yourdomain.com

    RewriteEngine On
    # Upgrade WebSocket connections to the backend (Convex live queries use wss)
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3310/$1 [P,L]
    # Everything else: normal HTTP proxy
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://127.0.0.1:3310/$1 [P,L]

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3310/
    ProxyPassReverse / http://127.0.0.1:3310/

    Header always set X-Content-Type-Options "nosniff"
    Header always unset Server

    # After Certbot adds TLS, also add (in the :443 block it generates):
    #   Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ErrorLog  /var/log/httpd/convex-todo-error.log
    CustomLog /var/log/httpd/convex-todo-access.log combined
</VirtualHost>
