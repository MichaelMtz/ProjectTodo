# =============================================================================
# Apache VirtualHost — todo-notes-app static SPA
#   Install to: /etc/httpd/conf.d/todo-spa.conf  (Amazon Linux / httpd)
#               /etc/apache2/sites-available/todo-spa.conf  (Ubuntu, then a2ensite)
#
# Serves the built Vite SPA from /var/www/todo-notes-app/dist with a client-side
# routing fallback (unknown paths return index.html) and long-lived caching on
# fingerprinted assets. The SPA talks to Convex directly over wss:// — this host
# only serves static files.
#
# Requirements (Apache 2.4): mod_rewrite, mod_headers
#   Verify:  httpd -M | grep -E "rewrite|headers"
#
# This is the HTTP-only form. Run `certbot --apache -d todo.yourdomain.com`
# afterwards; Certbot creates the :443 VirtualHost and the HTTP->HTTPS redirect.
#
# Apache 2.2: replace `Require all granted` with
#   Order allow,deny
#   Allow from all
#
# IMPORTANT: replace todo.yourdomain.com with your real domain before reload.
#            Always run `httpd -t` (or `apache2ctl configtest`) before reloading.
# =============================================================================

<VirtualHost *:80>
    ServerName todo.yourdomain.com
    DocumentRoot /var/www/todo-notes-app/dist

    <Directory /var/www/todo-notes-app/dist>
        Require all granted
        Options -Indexes
        AllowOverride None

        RewriteEngine On
        # Serve real files/dirs as-is
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]
        # Everything else -> SPA entry point (client-side routing)
        RewriteRule ^ /index.html [L]
    </Directory>

    # Cache fingerprinted assets aggressively; never cache index.html
    <FilesMatch "\.(js|css|woff2|woff|svg|png|jpg)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "index\.html$">
        Header set Cache-Control "no-cache"
    </FilesMatch>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always unset Server

    # After Certbot adds TLS, also add (in the :443 block it generates):
    #   Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ErrorLog  /var/log/httpd/todo-spa-error.log
    CustomLog /var/log/httpd/todo-spa-access.log combined
</VirtualHost>
